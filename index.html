/* ════════════════════════════════════════ */

const ALGOS = [
  {id:"combo", icon:"🤖", label:"AI 복합분석", desc:"빈도+구간+홀짝 종합"},
  {id:"freq",  icon:"🔥", label:"빈도수 우선",  desc:"자주 나온 번호"},

let selectedAlgo = "combo";
let selectedCount = 1;
let myRecords = [];

/* ── 볼 색상 ── */
function ballClass(n){ return n<=10?"y":n<=20?"b":n<=30?"r":n<=40?"p":"g"; }
function ballSize(sz){ return `width:${sz}px;height:${sz}px;font-size:${sz>44?15:sz>36?12:10}px`; }

function makeBall(n, sz=44, bonus=false, dim=false, delay=0){
  const cls = bonus ? "bonus" : ballClass(n);
  const dimCls = dim ? " dim" : "";
  const anim = delay>=0 && !dim ? `animation:popIn .5s cubic-bezier(.34,1.56,.64,1) ${delay}s both` : "";
  const dot = bonus ? `<div class="bonus-dot">B</div>` : "";
  return `<div class="ball ${cls}${dimCls}" style="${ballSize(sz)};${anim}">${n}${dot}</div>`;
}

/* ── 통계 계산 ── */
function calcFreq(){
  const f={};
  for(let i=1;i<=45;i++) f[i]=0;
  LOTTO_DATA.forEach(r=>r.nums.forEach(n=>f[n]++));
  return f;
}

/* ── 알고리즘 ── */
function generate(algo){
  const all=Array.from({length:45},(_,i)=>i+1);
  const freq=calcFreq();
  function pickFrom(pool,count,existing=[]){
    const res=[...existing];
    const sh=[...pool].sort(()=>Math.random()-.5);
    for(const n of sh){ if(!res.includes(n)){res.push(n); if(res.length===count+existing.length)break;} }
    return res.sort((a,b)=>a-b);
  }
  if(algo==="freq"){
    const top20=[...all].sort((a,b)=>freq[b]-freq[a]).slice(0,20);
    return pickFrom(top20,6);
  }
  if(algo==="cold"){
    const cold20=[...all].sort((a,b)=>freq[a]-freq[b]).slice(0,20);
    return pickFrom(cold20,6);
  }
  if(algo==="balance"){
    const odds=all.filter(n=>n%2!==0), evens=all.filter(n=>n%2===0);
    return pickFrom(evens,3,pickFrom(odds,3));
  }
  if(algo==="zone"){
    const zones=[[1,9],[10,18],[19,27],[28,36],[37,45]];
    const chosen=zones.map(([s,e])=>{const z=all.filter(n=>n>=s&&n<=e);return z[Math.floor(Math.random()*z.length)];});
    return pickFrom(all.filter(n=>!chosen.includes(n)),1,chosen);
  }
  if(algo==="combo"){
    const sorted=[...all].sort((a,b)=>freq[b]-freq[a]);
    const top30=sorted.slice(0,30);
    const zones=[[1,9],[10,18],[19,27],[28,36],[37,45]];
    const zRep=zones.map(([s,e])=>{const z=top30.filter(n=>n>=s&&n<=e);return z.length?z[0]:all.filter(n=>n>=s&&n<=e)[0];});
    return pickFrom([...new Set([...zRep,...top30])],6);
  }
  return pickFrom(all,6);
}

/* ── 탭 전환 ── */
function switchTab(id, btn){
  ["generate","stats","recent","records"].forEach(t=>{
    document.getElementById("tab-"+t).style.display = t===id?"block":"none";
  });
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  if(id==="stats") renderStats();
  if(id==="recent") renderRecent();
  if(id==="records") renderRecords();
}

/* ── 초기화 ── */
function init(){
  const latest = LOTTO_DATA[LOTTO_DATA.length-1];
  document.getElementById("dataInfo").textContent =
    `실제 동행복권 데이터 ${LOTTO_DATA.length}회 (${LOTTO_DATA[0].no}~${latest.no}회) 기반`;

  // 최신회차 배너
  const banner = document.getElementById("latestBanner");
  let ballsHtml = latest.nums.map(n=>makeBall(n,30)).join("");
  ballsHtml += `<span style="font-size:11px;color:#475569">+</span>` + makeBall(latest.bonus,30,true);
  banner.innerHTML = `<span class="latest-label">🏆 ${latest.no}회 (${latest.date})</span>
    <div class="ball-row">${ballsHtml}</div>`;

  // 알고리즘 그리드
  const ag = document.getElementById("algoGrid");
  ag.innerHTML = ALGOS.map(a=>`
    <div class="algo-card ${a.id==="combo"?"active":""}" id="algo-${a.id}" onclick="selectAlgo('${a.id}')">
      <div class="algo-icon">${a.icon}</div>
      <div class="algo-name">${a.label}</div>
      <div class="algo-desc">${a.desc}</div>
    </div>`).join("");

  // 게임 수 버튼
  const cr = document.getElementById("countRow");
  cr.innerHTML = [1,2,3,5,10].map(n=>`
    <button class="count-btn ${n===1?"active":""}" id="cnt-${n}" onclick="selectCount(${n})">${n}</button>`).join("");
}

function selectAlgo(id){
  selectedAlgo = id;
  document.querySelectorAll(".algo-card").forEach(c=>c.classList.remove("active"));
  document.getElementById("algo-"+id).classList.add("active");
}

function selectCount(n){
  selectedCount = n;
  document.querySelectorAll(".count-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("cnt-"+n).classList.add("active");
  document.getElementById("genBtn").textContent = `🎰 번호 추출하기 (${n}게임)`;
}

function handleGenerate(){
  const btn = document.getElementById("genBtn");
  btn.disabled = true;
  btn.innerHTML = `<span class="spin">⚙️</span> 분석 중...`;
  setTimeout(()=>{
    const games = Array.from({length:selectedCount},()=>generate(selectedAlgo));
    const algoInfo = ALGOS.find(a=>a.id===selectedAlgo);
    const labels = ["A","B","C","D","E","F","G","H","I","J"];
    let html = `<div class="result-cards">
      <div class="result-label">✨ 추출 결과 — ${algoInfo.icon} ${algoInfo.label}</div>`;
    games.forEach((game,gi)=>{
      const balls = game.map((n,i)=>makeBall(n,44,false,false,i*0.08)).join("");
      html += `<div class="result-card" style="animation-delay:${gi*0.08}s">
        <div class="result-sub">${labels[gi]}조</div>
        <div class="result-balls">${balls}</div>
      </div>`;
    });
    html += `</div>`;
    document.getElementById("results").innerHTML = html;
    btn.disabled = false;
    btn.textContent = `🎰 번호 추출하기 (${selectedCount}게임)`;

    // 기록 저장
    games.forEach(g=>{
      myRecords.unshift({nums:g, algo:selectedAlgo, time:new Date().toLocaleString("ko-KR")});
    });
    if(myRecords.length>60) myRecords=myRecords.slice(0,60);
  }, 900);
}

/* ── 통계 렌더 ── */
function renderStats(){
  const freq = calcFreq();
  const all45 = Array.from({length:45},(_,i)=>i+1);
  const byFreq = [...all45].sort((a,b)=>freq[b]-freq[a]);
  const top10 = byFreq.slice(0,10);
  const cold10 = byFreq.slice(-10).reverse();
  const maxFreq = Math.max(...Object.values(freq));

  // 홀짝 패턴
  const pm={};
  LOTTO_DATA.forEach(r=>{
    const o=r.nums.filter(n=>n%2!==0).length;
    const k=`홀${o}짝${6-o}`; pm[k]=(pm[k]||0)+1;
  });
  const patterns=Object.entries(pm).sort((a,b)=>b[1]-a[1]);

  let html = `
    <div class="section-title">🔥 자주 나온 번호 TOP 10 (최근 ${LOTTO_DATA.length}회)</div>
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px">
      ${top10.map((n,i)=>`<div style="display:flex;flex-direction:column;align-items:center;gap:5px">
        ${makeBall(n,46,false,false,-1)}
        <div style="font-size:10px;color:#a78bfa;font-weight:700">${freq[n]}회</div>
        <div style="font-size:9px;color:#475569">#${i+1}</div>
      </div>`).join("")}
    </div>

    <div class="section-title">❄️ 미출현 번호 TOP 10</div>
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px">
      ${cold10.map(n=>`<div style="display:flex;flex-direction:column;align-items:center;gap:5px">
        ${makeBall(n,46,false,true,-1)}
        <div style="font-size:10px;color:#475569;font-weight:700">${freq[n]}회</div>
      </div>`).join("")}
    </div>

    <div class="section-title">📊 전체 번호 빈도 히트맵</div>
    <div class="heatmap" style="margin-bottom:24px">
      ${all45.map(n=>{
        const ratio=freq[n]/maxFreq;
        const colors={"y":"#f59e0b","b":"#3b82f6","r":"#ef4444","p":"#8b5cf6","g":"#10b981"};
        const glow=colors[ballClass(n)];
        const alpha=Math.round(ratio*180+30).toString(16).padStart(2,"0");
        return `<div class="heatmap-cell" style="background:${glow}${alpha};border:1px solid ${glow}33">
          <div class="heatmap-n">${n}</div>
          <div class="heatmap-c">${freq[n]}</div>
        </div>`;
      }).join("")}
    </div>

    <div class="section-title">⚖️ 홀짝 비율 분석</div>
    ${patterns.slice(0,7).map(([k,v])=>`
      <div class="stat-row">
        <div style="width:66px;font-size:11px;font-weight:700;color:#e2e8f0;flex-shrink:0">${k}</div>
        <div class="stat-bar-wrap">
          <div class="stat-bar" style="width:${(v/LOTTO_DATA.length)*100}%;background:linear-gradient(90deg,#8b5cf6,#6366f1)">${v}회</div>
        </div>
        <div style="font-size:11px;color:#64748b;width:38px;text-align:right;flex-shrink:0">${((v/LOTTO_DATA.length)*100).toFixed(1)}%</div>
      </div>`).join("")}

    <div class="section-title" style="margin-top:20px">🎯 구간별 출현 횟수</div>
    ${[{r:"1~10",c:"#f59e0b"},{r:"11~20",c:"#3b82f6"},{r:"21~30",c:"#ef4444"},{r:"31~40",c:"#8b5cf6"},{r:"41~45",c:"#10b981"}].map(({r,c})=>{
      const [s,e]=r.split("~").map(Number);
      const cnt=LOTTO_DATA.reduce((acc,d)=>acc+d.nums.filter(n=>n>=s&&n<=e).length,0);
      return `<div class="stat-row">
        <div style="width:46px;font-size:11px;font-weight:700;color:#e2e8f0;flex-shrink:0">${r}</div>
        <div class="stat-bar-wrap">
          <div class="stat-bar" style="width:${Math.min((cnt/(LOTTO_DATA.length*2))*100,100)}%;background:${c}">${cnt}</div>
        </div>
      </div>`;
    }).join("")}
  `;
  document.getElementById("tab-stats").innerHTML = html;
}

/* ── 최근당첨 렌더 ── */
function renderRecent(){
  const latest = LOTTO_DATA[LOTTO_DATA.length-1];
  let html = `<div class="section-title">📅 실제 당첨번호 (최근 ${LOTTO_DATA.length}회 — ${LOTTO_DATA[0].no}~${latest.no}회)</div>`;
  [...LOTTO_DATA].reverse().forEach(d=>{
    const isLatest = d.no===latest.no;
    const balls = d.nums.map(n=>makeBall(n,36,false,false,-1)).join("");
    const bonus = makeBall(d.bonus,36,true,false,-1);
    html += `<div class="draw-card ${isLatest?"latest":""}">
      <div class="draw-meta">
        <span class="draw-no ${isLatest?"latest":""}">${d.no}회 ${isLatest?"🏆 최신":""}</span>
        <span class="draw-date">${d.date}</span>
      </div>
      <div class="ball-row wrap">${balls}<span style="font-size:11px;color:#475569;align-self:center">+</span>${bonus}</div>
    </div>`;
  });
  document.getElementById("tab-recent").innerHTML = html;
}

/* ── 내기록 렌더 ── */
function renderRecords(){
  document.getElementById("recTitle").textContent = `📋 내 추출 기록 (${myRecords.length}건)`;
  if(myRecords.length===0){
    document.getElementById("recordsList").innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🎱</div>
        <div class="empty-title">아직 기록이 없어요</div>
        <div class="empty-sub">번호 추출 탭에서 생성해보세요!</div>
      </div>`;
    return;
  }
  let html="";
  myRecords.forEach((r,i)=>{
    const algoInfo=ALGOS.find(a=>a.id===r.algo);
    const balls=r.nums.map(n=>makeBall(n,36,false,false,-1)).join("");
    html+=`<div class="rec-card" style="animation-delay:${Math.min(i,.5)*0.05}s">
      <div class="rec-meta">
        <span class="rec-algo">${algoInfo.icon} ${algoInfo.label}</span>
        <span class="rec-time">${r.time}</span>
      </div>
      <div class="ball-row wrap">${balls}</div>
    </div>`;
  });
  document.getElementById("recordsList").innerHTML = html;
}

function clearRecords(){
  myRecords=[];
  renderRecords();
}

init();
</script>
